apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: ecommerce
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: mohanck6666/backend:1.0
        envFrom:
        - secretRef:
            name: postgres-secret
        - configMapRef:
            name: backend-config
        ports:
        - containerPort: 5000
